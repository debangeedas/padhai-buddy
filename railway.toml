[build]
builder = "NIXPACKS"
buildCommand = "pip install --upgrade pip && pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt && python -c \"from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')\""

[deploy]
startCommand = "uvicorn server:app --host 0.0.0.0 --port ${PORT:-8000}"
